name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  secrets-scan:
    name: Private-info scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail on leaked IP / email / API key
        run: |
          if grep -rIn -E '192\.168\.[0-9]+\.[0-9]+|khosla\.kunal@gmail\.com|sk-ant-[A-Za-z0-9_-]+' \
            --exclude-dir=.git --exclude='*.local.md' .; then
            echo "::error::Private information found in tracked files"
            exit 1
          fi
          echo "No private information found."
